<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OctaBit - MIDI to 8-bit Converter</title>
    <meta name="description" content="A simple web tool for converting MIDI files into 8-bit style music." />
    <meta name="application-name" content="OctaBit" />
    <link rel="canonical" href="https://octabit.cc/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OctaBit" />
    <meta property="og:title" content="OctaBit - MIDI to 8-bit Converter" />
    <meta property="og:description" content="A simple web tool for converting MIDI files into 8-bit style music." />
    <meta property="og:url" content="https://octabit.cc/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="OctaBit - MIDI to 8-bit Converter" />
    <meta name="twitter:description" content="A simple web tool for converting MIDI files into 8-bit style music." />
    <script>
      (function () {
        const key = 'octabitTheme';
        const values = ['light', 'dark'];
        const html = document.documentElement;
        const stored = values.includes(localStorage.getItem(key)) ? localStorage.getItem(key) : null;
        const system = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        html.setAttribute('data-bs-theme', stored || system);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
